<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Resources</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Roboto Condensed", sans-serif;
            background: linear-gradient(-45deg,#020617,#0f172a,#1e293b,#22c55e);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
            color: white; margin: 0;
            overflow-x: hidden;
        }
        @keyframes gradientMove {
             0%{background-position:0% 50%;
            } 50%{background-position:100% 50%;
            }100%{background-position:0% 50%;
            }
         }
        
        .nav { 
            display: flex;
             justify-content: space-between;
              padding: 15px 20px;
               background: rgba(15, 23, 42, 0.8);
                backdrop-filter: blur(10px);
        }
        .nav a {
             color: #22c55e; 
             text-decoration: none;
              font-weight: bold;
             }
        .container {
             padding: 40px 20px;
              max-width: 900px;
               margin: auto;
             }
        
        .resource-section {
             margin-bottom: 40px;
             }
        .resource-section h2 {
             border-bottom: 2px solid #22c55e;
              padding-bottom: 10px;
               margin-bottom: 20px;
             }
        
        /* List Styling */
        .resource-list {
             list-style: none;
             }
        .resource-item {
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px; /* Ensures space between text and button on mobile */
            transition: 0.3s;
        }
        .resource-item:hover {
             background: rgba(34, 197, 94, 0.2);
             }
        .btn-download {
            background: #22c55e;
            color: black;
            padding: 8px 15px; /* Slightly thicker padding for touch targets */
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s ease;
            white-space: nowrap; /* Prevents button text from wrapping */
        }
        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #22c55e;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">← Home</a>
        <span>Resource Hub</span>
    </div>
    <div class="container">
        <div class="resource-section">
            <h2>Major Materials</h2>
            <ul class="resource-list">
                <li class="resource-item">
                    <span>C Programming Notes - PDF</span>
                    <a href="#" class="btn-download">Download</a>
                </li>
            </ul>
        </div>

        <div class="resource-section">
            <h2>Minor 1 Materials</h2>
            <ul class="resource-list">
                <li class="resource-item">
                    <span>Graph Theory And Automata</span>
                    <a href="#" class="btn-download">Download</a>
                </li>
            </ul>
        </div>

        <div class="resource-section">
            <h2>Minor 2 Materials</h2>
            <ul class="resource-list">
                <li class="resource-item">
                    <span>Regression And Probability Theory</span>
                    <a href="#" class="btn-download">Download</a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
