<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Insights | CS Department</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body.modal-open { overflow: hidden; }

        /* ── Hero ── */
        .insights-hero {
            padding: 9rem 4rem 2.5rem;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .insights-heading {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2rem, 5vw, 4.5rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
            white-space: nowrap;
            margin-bottom: 0.8rem;
        }
        .insights-heading span {
            color: var(--accent-color);
            text-shadow: 0 0 40px rgba(255, 69, 0, 0.5);
        }
        .insights-sub {
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* ── Back link ── */
        .back-link-wrap {
            position: absolute;
            top: 5.5rem;
            left: 4rem;
            z-index: 10;
        }
        .back-link {
            display: inline-block;
            color: #666;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s, transform 0.3s;
        }
        .back-link:hover { color: var(--accent-color); transform: translateX(-4px); }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            max-width: 100%;
            margin: 0 auto 3rem;
            padding: 0 4rem;
            position: relative;
            z-index: 2;
        }
        .stat-card-new {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card-new::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent-color);
        }
        .stat-card-new:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.4);
            border-color: rgba(255,69,0,0.3);
        }
        .stat-icon { font-size: 2rem; display: block; margin-bottom: 1rem; }
        .stat-number {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            color: var(--accent-secondary);
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            color: #555;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
        }

        /* ── Section Divider ── */
        .section-divider {
            max-width: 100%;
            margin: 0 auto 1.5rem;
            padding: 0 4rem;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .section-divider h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        /* ── Search / Controls ── */
        .table-controls {
            max-width: 100%;
            margin: 0 auto 1.5rem;
            padding: 0 4rem;
            position: relative;
            z-index: 2;
        }
        .search-input {
            width: 100%;
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.85rem 1.4rem;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255,69,0,0.1);
        }
        .search-input::placeholder { color: #444; }

        /* ── Table ── */
        .table-wrap {
            max-width: 100%;
            margin: 0 auto 6rem;
            padding: 0 4rem;
            position: relative;
            z-index: 2;
        }
        .sgpa-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .sgpa-table thead th {
            text-align: left;
            padding: 0 16px 8px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s;
        }
        .sgpa-table thead th:hover { color: var(--accent-color); }
        .sgpa-table thead th.sort-active { color: var(--accent-color); }

        .sgpa-table tbody tr {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s;
        }
        .sgpa-table tbody tr:hover {
            transform: scale(1.01);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 8px 28px rgba(0,0,0,0.3);
        }

        .sgpa-table tbody td {
            padding: 14px 16px;
            color: var(--text-color);
        }
        .sgpa-table tbody td:first-child {
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }
        .sgpa-table tbody td:last-child {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* Rank badge */
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: 'Outfit', sans-serif;
            background: rgba(255,255,255,0.05);
            color: #666;
            border: 1px solid var(--glass-border);
        }

        /* Top 3 row glow borders */
        .rank-1 { border-color: rgba(255,215,0,0.35) !important; }
        .rank-2 { border-color: rgba(192,192,192,0.3) !important; }
        .rank-3 { border-color: rgba(205,127,50,0.3) !important; }

        /* SGPA progress bar */
        .sgpa-cell { display: flex; align-items: center; gap: 12px; }
        .sgpa-bar-wrap {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            overflow: hidden;
            min-width: 80px;
        }
        .sgpa-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent-secondary);
        }
        .rank-1 .sgpa-bar-fill { background: linear-gradient(90deg, #ffd700, #22c55e); }
        .rank-2 .sgpa-bar-fill { background: linear-gradient(90deg, #c0c0c0, #22c55e); }
        .rank-3 .sgpa-bar-fill { background: linear-gradient(90deg, #cd7f32, #22c55e); }

        .sgpa-value {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--accent-secondary);
            font-size: 0.95rem;
            min-width: 46px;
        }
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #444;
            font-size: 0.95rem;
        }

        /* ── Modal ── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 2000;
        }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #111;
            border: 1px solid var(--glass-border);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transform: translateY(30px) scale(0.94);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.show .modal-content { transform: translateY(0) scale(1); }

        .modal-close {
            position: absolute;
            top: 16px; right: 18px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #555;
            background: none;
            border: none;
            transition: color 0.3s;
        }
        .modal-close:hover { color: #fff; }

        .modal-rank-badge {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            margin: 0 auto 1.2rem;
        }
        .modal-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }
        .modal-reg {
            color: #555;
            font-size: 0.82rem;
            letter-spacing: 0.1em;
            margin-bottom: 1.8rem;
        }

        /* Circular gauge */
        .gauge-wrap {
            position: relative;
            width: 130px; height: 130px;
            margin: 0 auto 1.8rem;
        }
        .gauge-svg {
            width: 130px; height: 130px;
            transform: rotate(-90deg);
        }
        .gauge-bg  { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 10; }
        .gauge-fill {
            fill: none;
            stroke: var(--accent-secondary);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 339.3;
            stroke-dashoffset: 339.3;
            transition: stroke-dashoffset 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .gauge-label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .gauge-number {
            font-family: 'Outfit', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--accent-secondary);
            line-height: 1;
        }
        .gauge-out-of { font-size: 0.7rem; color: #555; margin-top: 3px; }

        .modal-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            text-align: left;
        }
        .modal-detail-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.7rem 1rem;
        }
        .modal-detail-label {
            font-size: 0.68rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.2rem;
        }
        .modal-detail-value {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .stats-grid, .table-controls, .table-wrap, .section-divider { padding: 0 1.5rem; }
            .insights-hero { padding: 8rem 1.5rem 2rem; }
            .back-link-wrap { left: 1.5rem; }
        }
        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: 1fr; }
            .sgpa-table thead { display: none; }
            .sgpa-table tbody tr {
                display: block;
                margin-bottom: 12px;
                border-radius: 12px;
            }
            .sgpa-table tbody td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 14px;
                border-bottom: 1px solid var(--glass-border);
            }
            .sgpa-table tbody td:last-child { border: none; }
            .sgpa-table tbody td:first-child,
            .sgpa-table tbody td:last-child { border-radius: 0; }
            .sgpa-table tbody td::before {
                content: attr(data-label);
                font-size: 0.72rem;
                color: #555;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
            }
            .modal-details { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body class="show">

<canvas id="bg-canvas"></canvas>

<nav class="nav">
    <div class="head-nav">Computer <span>Science</span></div>
</nav>

<!-- Back link -->
<div class="back-link-wrap">
    <a href="index.html" class="back-link">← Home</a>
</div>

<!-- Hero -->
<div class="scroll-container">
    <div class="insights-hero">
        <h1 id="typing" class="insights-heading"></h1>
        <p class="insights-sub">Academic Performance — Batch 2025–2029</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card-new">
            <span class="stat-icon">👥</span>
            <div class="stat-number" id="total-students">0</div>
            <div class="stat-label">Total Students</div>
        </div>
        <div class="stat-card-new">
            <span class="stat-icon">📊</span>
            <div class="stat-number" id="average-sgpa">0.000</div>
            <div class="stat-label">Average SGPA — Sem 1</div>
        </div>
        <div class="stat-card-new">
            <span class="stat-icon">🏆</span>
            <div class="stat-number" id="top-sgpa">0.000</div>
            <div class="stat-label">Top SGPA — Sem 1</div>
        </div>
    </div>

    <!-- Section heading -->
    <div class="section-divider">
        <h2>Rankings</h2>
        <div class="divider-line"></div>
    </div>

    <!-- Search -->
    <div class="table-controls">
        <input id="search-input" class="search-input" type="text"
               placeholder="🔍  Search by name or reg no…" oninput="filterTable()">
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <table class="sgpa-table" id="sgpa-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Reg No</th>
                    <th id="sort-header" onclick="toggleSort()" style="cursor:pointer">SGPA ↕</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal" onclick="handleModalClick(event)">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-rank-badge" id="modal-rank-badge"></div>
        <div class="modal-name"  id="pName"></div>
        <div class="modal-reg"   id="pReg"></div>
        <div class="gauge-wrap">
            <svg class="gauge-svg" viewBox="0 0 120 120">
                <circle class="gauge-bg"   cx="60" cy="60" r="54"/>
                <circle class="gauge-fill" id="gauge-fill" cx="60" cy="60" r="54"/>
            </svg>
            <div class="gauge-label">
                <div class="gauge-number" id="pSgpa"></div>
                <div class="gauge-out-of">out of 10</div>
            </div>
        </div>
        <div class="modal-details">
            <div class="modal-detail-box">
                <div class="modal-detail-label">Position</div>
                <div class="modal-detail-value" id="pPosition"></div>
            </div>
            <div class="modal-detail-box">
                <div class="modal-detail-label">Semester</div>
                <div class="modal-detail-value">First</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ── Data ──────────────────────────────────────────────────────────────────
    const students = [
        { rank:1,  name:'Ajmal NT',           reg:'GVAZSCS002', sgpa:9.286 },
        { rank:2,  name:'Munshifa P',          reg:'GVAZSCS017', sgpa:8.857 },
        { rank:3,  name:'Fathima Huda PC',     reg:'GVAZSCS006', sgpa:8.667 },
        { rank:4,  name:'Fathima Hannin MP',   reg:'GVAZSCS004', sgpa:8.333 },
        { rank:5,  name:'Jumana Jebin M',      reg:'GVAZSCS008', sgpa:8.238 },
        { rank:6,  name:'Fathima Hanna',       reg:'GVAZSCS005', sgpa:7.333 },
        { rank:7,  name:'Safna Sheri AT',      reg:'GVAZSCS018', sgpa:7.333 },
        { rank:8,  name:'Shelshal Jubin KC',   reg:'GVAZSCS020', sgpa:7.190 },
        { rank:9,  name:'Muhammed Aflah A',    reg:'GVAZSCS013', sgpa:6.857 },
        { rank:10, name:'Jasfal C',            reg:'GVAZSCS007', sgpa:5.810 },
        { rank:11, name:'Muhammed Razique PK', reg:'GVAZSCS015', sgpa:5.762 },
        { rank:12, name:'Mohammed Shaheer',    reg:'GVAZSCS010', sgpa:5.333 },
        { rank:13, name:'Abdul Rashid M',      reg:'GVAZSCS001', sgpa:0.000 },
        { rank:14, name:'Anshif Hyder',        reg:'GVAZSCS003', sgpa:0.000 },
        { rank:15, name:'Mohammed Fadil',      reg:'GVAZSCS009', sgpa:0.000 },
        { rank:16, name:'Mohammed Sinan CK',   reg:'GVAZSCS011', sgpa:0.000 },
        { rank:17, name:'Muhammed Shamil K',   reg:'GVAZSCS012', sgpa:0.000 },
        { rank:18, name:'Muhammed BazilSha T', reg:'GVAZSCS014', sgpa:0.000 },
        { rank:19, name:'Muhammed Sinan NK',   reg:'GVAZSCS016', sgpa:0.000 },
        { rank:20, name:'Shamnad PK',          reg:'GVAZSCS019', sgpa:0.000 },
    ];

    let sortAsc = false;

    // ── Render ────────────────────────────────────────────────────────────────
    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="4" class="no-results">No students found.</td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(s => {
            const rc  = s.rank <= 3 ? `rank-${s.rank}` : 'rank-other';
            const pct = (s.sgpa / 10 * 100).toFixed(1);
            const badge = `<span class="rank-badge">${s.rank}</span>`;
            return `
            <tr class="${rc}" onclick="openProfile(${s.rank},'${s.name}','${s.reg}',${s.sgpa})">
                <td data-label="Rank">${badge}</td>
                <td data-label="Name" style="font-weight:500">${s.name}</td>
                <td data-label="Reg No" style="color:#555;font-size:0.85rem">${s.reg}</td>
                <td data-label="SGPA">
                    <div class="sgpa-cell">
                        <span class="sgpa-value">${s.sgpa.toFixed(3)}</span>
                        <div class="sgpa-bar-wrap">
                            <div class="sgpa-bar-fill" style="width:${pct}%"></div>
                        </div>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    // ── Search ────────────────────────────────────────────────────────────────
    function filterTable() {
        const q = document.getElementById('search-input').value.toLowerCase().trim();
        const filtered = students.filter(s =>
            s.name.toLowerCase().includes(q) || s.reg.toLowerCase().includes(q)
        );
        renderTable(filtered);
    }

    // ── Sort ──────────────────────────────────────────────────────────────────
    function toggleSort() {
        sortAsc = !sortAsc;
        const sorted = [...students].sort((a, b) => sortAsc ? a.sgpa - b.sgpa : b.sgpa - a.sgpa);
        document.getElementById('sort-header').textContent = `SGPA ${sortAsc ? '↑' : '↓'}`;
        document.getElementById('sort-header').classList.add('sort-active');
        renderTable(sorted);
    }

    // ── Typing ────────────────────────────────────────────────────────────────
    const htmlString = 'FIRST SEMESTER <span>SGPA</span>';
    let idx = 0;
    function typeEffect() {
        const el = document.getElementById('typing');
        if (idx < htmlString.length) {
            if (htmlString[idx] === '<') {
                let tag = '';
                while (htmlString[idx] !== '>' && idx < htmlString.length) tag += htmlString[idx++];
                tag += '>';
                el.innerHTML += tag;
            } else {
                el.innerHTML += htmlString[idx];
            }
            idx++;
            setTimeout(typeEffect, 85);
        }
    }

    // ── Count animation ───────────────────────────────────────────────────────
    function animateCount(id, end, dur, dec = 0) {
        const el = document.getElementById(id);
        let t0 = null;
        const step = ts => {
            if (!t0) t0 = ts;
            const p = Math.min((ts - t0) / dur, 1);
            el.textContent = (p * end).toFixed(dec);
            if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    function openProfile(rank, name, reg, sgpa) {
        document.getElementById('pName').textContent = name;
        document.getElementById('pReg').textContent  = reg;
        document.getElementById('pSgpa').textContent = sgpa.toFixed(3);
        document.getElementById('pPosition').textContent = `#${rank}`;

        const badge = document.getElementById('modal-rank-badge');
        badge.textContent = `#${rank}`;
        badge.style.fontSize = '1rem';
        badge.style.background =
            rank === 1 ? 'linear-gradient(135deg,#ffd700,#ffaa00)' :
            rank === 2 ? 'linear-gradient(135deg,#c0c0c0,#888)' :
            rank === 3 ? 'linear-gradient(135deg,#cd7f32,#8b4513)' : 'rgba(255,255,255,0.05)';
        badge.style.color = rank <= 3 ? '#000' : '#888';

        // Circular gauge
        const C = 2 * Math.PI * 54; // 339.29
        const fill = document.getElementById('gauge-fill');
        fill.style.strokeDashoffset = C;
        setTimeout(() => {
            fill.style.strokeDashoffset = C - (sgpa / 10) * C;
        }, 80);

        document.getElementById('modal').classList.add('show');
        document.body.classList.add('modal-open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('show');
        document.body.classList.remove('modal-open');
    }

    function handleModalClick(e) {
        if (e.target.id === 'modal') closeModal();
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    window.onload = () => {
        renderTable(students);
        typeEffect();
        animateCount('total-students', 20,    2000, 0);
        animateCount('average-sgpa',   4.453, 3000, 3);
        animateCount('top-sgpa',       9.286, 3000, 3);
    };
</script>

        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
        </svg>
    </button>

    <!-- Music Player Panel -->
    <div id="music-panel" class="music-panel">
        <div class="mp-header">
            <span class="mp-label">NOW PLAYING</span>
            <button id="mp-close-btn" class="mp-close">&times;</button>
        </div>

        <div id="mp-song-list" class="mp-song-list"></div>

        <div class="mp-now-playing">
            <div id="mp-disc" class="mp-disc">
                <div class="mp-disc-inner">CS</div>
            </div>
            <div class="mp-info">
                <div id="mp-song-title" class="mp-song-title">Loading...</div>
                <div id="mp-song-artist" class="mp-song-artist">Please wait</div>
            </div>
        </div>

        <div class="mp-progress-wrap">
            <span id="mp-current" class="mp-time">0:00</span>
            <input type="range" id="mp-seek" class="mp-seek" value="0" min="0" max="100">
            <span id="mp-duration" class="mp-time">0:00</span>
        </div>

        <div class="mp-controls">
            <button id="mp-prev" class="mp-ctrl-btn" title="Previous">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6L19 18V6z" />
                </svg>
            </button>
            <button id="mp-play" class="mp-ctrl-btn mp-play-btn" title="Play/Pause">
                <svg id="mp-play-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </button>
            <button id="mp-next" class="mp-ctrl-btn" title="Next">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                </svg>
            </button>
        </div>

        <div class="mp-volume-wrap">
            <span class="mp-vol-icon">🔈</span>
            <input type="range" id="mp-volume" class="mp-seek" value="0.7" min="0" max="1" step="0.1">
            <span class="mp-vol-icon">🔊</span>
        </div>

        <audio id="mp-audio" src=""></audio>
    </div>

    <script src="animations.js"></script>
    <script src="music-player.js"></script>
</body>
</html>
