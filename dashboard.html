<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT DASHBOARD | CS DEPARTMENT</title>
    
    <!-- Modern Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.12.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: var(--accent-secondary);
            --card-bg: var(--surface-color);
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        /* Responsive UI Fixes */
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            padding: 10px 18px; border: 1px solid var(--primary);
            background: rgba(15, 23, 42, 0.9); color: var(--primary);
            text-decoration: none; border-radius: 6px; font-weight: bold;
            font-size: 0.8rem; backdrop-filter: blur(10px);
        }

        section {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 100px 15px 40px 15px; box-sizing: border-box;
            opacity: 0; transform: translateY(20px); transition: 0.8s;
        }
        section.reveal { opacity: 1; transform: translateY(0); }

        .hero-name {
            font-size: clamp(2.5rem, 8vw, 5rem);
            background: linear-gradient(to bottom, #fff 30%, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; font-weight: 900; text-align: center;
        }

        .content-card {
            background: var(--card-bg); padding: clamp(20px, 5vw, 40px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 850px; backdrop-filter: blur(20px);
            box-sizing: border-box;
        }

        /* 📱 BETTER ADMIN LAYOUT */
        .admin-controls {
            display: flex; flex-direction: column; gap: 15px;
        }
        .admin-input {
            width: 100%; background: #0f172a; border: 1px solid var(--primary);
            color: white; padding: 14px; border-radius: 10px; font-size: 1rem;
            box-sizing: border-box; outline: none;
        }
        .admin-btn {
            background: var(--primary); color: #020617; border: none;
            padding: 16px; border-radius: 10px; font-weight: 900;
            cursor: pointer; transition: 0.3s; width: 100%;
        }

        /* 📋 TASK LIST RESPONSIVENESS */
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 15px;
        }

        .task-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .task-actions { display: flex; gap: 8px; align-items: center; }

        /* Button Labels reverted to your original names */
        .action-btn {
            padding: 6px 12px; border-radius: 6px; font-size: 0.7rem;
            font-weight: bold; cursor: pointer; border: 1px solid transparent;
        }
        .btn-status { border-color: var(--accent-blue); color: var(--accent-blue); background: transparent; }
        .btn-remove { border-color: var(--accent-red); color: var(--accent-red); background: transparent; }

        /* 📊 STATS GRID */
        .counter-container { 
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; gap: 30px; margin-top: 40px; width: 100%; max-width: 500px;
        }
        .stat-box { text-align: center; }
        .divider { width: 1px; height: 70px; background: var(--primary); opacity: 0.3; }

        @media (max-width: 650px) {
            .counter-container { grid-template-columns: 1fr; gap: 20px; }
            .divider { width: 60%; height: 1px; margin: 0 auto; }
            .list-item { flex-direction: column; align-items: flex-start; }
            .task-actions { width: 100%; justify-content: space-between; margin-top: 10px; }
        }

        .grade-pill {
            padding: 5px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .grade-o { color: #facc15; border-color: #facc15; }
        .grade-ap { color: #4ade80; border-color: #4ade80; }
        .grade-f { color: #f87171; border-color: #f87171; }
        .grade-default { color: #94a3b8; }
    </style>
</head>
<body class="show">

    <!-- 3D CANVAS BACKGROUND -->
    <canvas id="bg-canvas"></canvas>

    <div class="scroll-container">
    <a href="index.html" class="back-link" style="position: absolute; top: 100px; left: 20px; z-index: 1000; padding: 10px 20px; background: rgba(5,5,5,0.5); backdrop-filter: blur(10px); border-radius: 8px; font-weight: bold; font-family: 'Outfit';">← GO TO HOME</a>

    <section id="hero">
        <p style="color:var(--primary); letter-spacing:5px; font-weight:bold; font-size:0.8rem;">DASHBOARD</p>
        <h1 id="user-name" class="hero-name">...</h1>
        <p id="user-reg" style="opacity:0.5; margin-top:10px;">Reg No: ...</p>
        
        <div class="counter-container">
            <div class="stat-box">
                <p style="font-size:0.7rem; color:var(--primary);">FIRST SEMESTER SGPA</p>
                <h2 class="count-up" id="user-sgpa" data-target="0" style="font-size:2.8rem; margin:0;">0.000</h2>
            </div>
            <div class="divider"></div>
            <div class="stat-box">
                <p style="font-size:0.7rem; color:var(--primary);">ATTENDANCE</p>
                <h2 class="count-up" id="user-attendance" data-target="0" style="font-size:2.8rem; margin:0;">0</h2>
            </div>
        </div>
    </section>

    <section id="admin-section" style="display: none;">
        <div class="content-card" style="border: 1px solid var(--primary);">
            <p style="color:var(--primary); font-weight:bold; margin-bottom:20px;">ADMIN PANEL</p>
            <div class="admin-controls">
                <select id="student-select" class="admin-input">
                    <option value="GVAZSCS001">Abdul Rashid M</option>
                    <option value="GVAZSCS002">Ajmal Nt</option>
                    <option value="GVAZSCS003">Anshif Hyder</option>
                    <option value="GVAZSCS004">Fathima Hannin</option>
                    <option value="GVAZSCS005">Fathima Hanna</option>
                    <option value="GVAZSCS006">Fathima Huda Pc</option>
                    <option value="GVAZSCS007">Jasfal C</option>
                    <option value="GVAZSCS008">Jumana Jebin</option>
                    <option value="GVAZSCS009">Mohammed Fadil</option>
                    <option value="GVAZSCS010">Muhammed Shaheer</option>
                    <option value="GVAZSCS011">Mohammed Sinan Ck</option>
                    <option value="GVAZSCS012">Muhammed Shamil</option>
                    <option value="GVAZSCS013">Muhammed Aflah A</option>
                    <option value="GVAZSCS014">Muhammed Bazilsha</option>
                    <option value="GVAZSCS015">Muhammed Rasique Pk</option>
                    <option value="GVAZSCS016">Muhammed Sinan Nk</option>
                    <option value="GVAZSCS017">Munshifa P</option>
                    <option value="GVAZSCS018">Safna Sheri</option>
                    <option value="GVAZSCS019">Shamnad Pk</option>
                    <option value="GVAZSCS020">Shelshal Jubin</option>
                </select>
                <input type="text" id="task-input" class="admin-input" placeholder="Enter task details...">

    <section id="academics">
        <div class="content-card">
            <p style="color:var(--primary); font-weight:bold; margin-bottom:20px;">SEMESTER RESULTS</p>
            <div id="subject-container"></div>
        </div>
    </section>

    <section id="tasks">
        <div class="content-card" style="border-left: 4px solid var(--primary);">
            <p style="color:var(--primary); font-weight:bold; margin-bottom:20px;">TASK ANALYSIS</p>
            <div id="task-container"></div>
        </div>
    </section>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const firebaseConfig = {
            apiKey: "AIzaSyDz7PWoH4vbObyhYXhXNqi2Cr5uwjBdwJY",
            authDomain: "cs-database-42dd0.firebaseapp.com",
            databaseURL: "https://cs-database-42dd0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cs-database-42dd0",
            storageBucket: "cs-database-42dd0.firebasestorage.app",
            messagingSenderId: "265634068059",
            appId: "1:265634068059:web:4437f49f445c18d574717e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('globalStudentDB');

        const regNo = localStorage.getItem("loggedUserReg");
        const isAdmin = regNo === "ADMIN";
        if (isAdmin) document.getElementById("admin-section").style.display = "flex";

        let studentDB = {};

        dbRef.on('value', (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                studentDB = cloudData;
                updateUI();
            }
        });

        function updateUI() {
            const data = studentDB[regNo] || { name: "Guest", sgpa: 0, attendance: 0, grades: [], tasks: [] };
            document.getElementById("user-name").innerText = data.name;
            document.getElementById("user-reg").innerText = "Reg No: " + (regNo || "N/A");
            document.getElementById("user-sgpa").setAttribute('data-target', data.sgpa || 0);
            document.getElementById("user-attendance").setAttribute('data-target', data.attendance || 0);

            const subBox = document.getElementById("subject-container");
            subBox.innerHTML = "";
            if(data.grades) {
                data.grades.forEach(item => {
                    const style = getGradeStyle(item.g);
                    subBox.innerHTML += `<div class="list-item"><span>${item.s}</span><span class="grade-pill ${style}">${item.g === "null" ? "Pending" : item.g}</span></div>`;
                });
            }
            renderTasks();
            startCounters();
        }

        function getGradeStyle(g) {
            const grade = String(g).toUpperCase();
            if (["O","A+","A"].includes(grade)) return grade === "O" ? "grade-o" : "grade-ap";
            if (grade === "F") return "grade-f";
            return "grade-default";
        }

        window.renderTasks = () => {
            const taskBox = document.getElementById("task-container");
            taskBox.innerHTML = "";
            if (isAdmin) {
                Object.keys(studentDB).forEach(sID => {
                    if(sID === "ADMIN") return;
                    (studentDB[sID].tasks || []).forEach((task, idx) => {
                        taskBox.innerHTML += createTaskHTML(task, sID, idx, true);
                    });
                });
            } else {
                (studentDB[regNo]?.tasks || []).forEach((task, idx) => {
                    taskBox.innerHTML += createTaskHTML(task, regNo, idx, false);
                });
            }
        };

        function createTaskHTML(task, ownerID, idx, isAdm) {
            const isSub = task.status === "submitted";
            const owner = isAdm ? `<small style="display:block;color:var(--primary);">${studentDB[ownerID].name}</small>` : "";
            const btns = isAdm ? `<div class="task-actions"><button class="action-btn btn-status" onclick="toggleStatus('${ownerID}', ${idx})">TOGGLE</button><button class="action-btn btn-remove" onclick="removeTask('${ownerID}', ${idx})">REMOVE</button></div>` : "";
            const statusLabel = `<span style="font-size:0.6rem; padding:2px 6px; border:1px solid ${isSub ? '#22c55e' : '#ef4444'}; color:${isSub ? '#22c55e' : '#ef4444'}">${task.status.toUpperCase()}</span>`;

            return `<div class="list-item"><div class="task-info"><span>${owner}<span style="color:${isSub?'#22c55e':'#ef4444'};">●</span> ${task.text}</span></div><div class="task-actions">${statusLabel}${btns}</div></div>`;
        }

        window.pushTask = () => {
            const target = document.getElementById("student-select").value;
            const text = document.getElementById("task-input").value;
            if(!text) return;
            if(!studentDB[target].tasks) studentDB[target].tasks = [];
            studentDB[target].tasks.push({ text: text, status: "pending" });
            dbRef.set(studentDB); 
            document.getElementById("task-input").value = "";
        };

        window.toggleStatus = (id, idx) => {
            studentDB[id].tasks[idx].status = (studentDB[id].tasks[idx].status === "pending") ? "submitted" : "pending";
            dbRef.set(studentDB);
        };

        window.removeTask = (id, idx) => {
            if(confirm("Delete task?")) {
                studentDB[id].tasks.splice(idx, 1);
                dbRef.set(studentDB);
            }
        };

        function startCounters() {
            document.querySelectorAll('.count-up').forEach(counter => {
                const target = +counter.getAttribute('data-target');
                let count = 0;
                const update = () => {
                    if (count < target) {
                        count += (target / 40);
                        counter.innerText = (counter.id === "user-sgpa") ? count.toFixed(3) : Math.ceil(count) + "%";
                        setTimeout(update, 20);
                    } else {
                        counter.innerText = (counter.id === "user-sgpa") ? target.toFixed(3) : target + "%";
                    }
                };
                update();
            });
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('reveal'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('section').forEach(s => observer.observe(s));
    });
    </script>
    
    </div> <!-- .scroll-container end -->

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="animations.js"></script>
</body>
</html>
