<script src="https://www.gstatic.com/firebasejs/9.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.12.1/firebase-database-compat.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const firebaseConfig = {
        apiKey: "AIzaSyDz7PWoH4vbObyhYXhXNqi2Cr5uwjBdwJY",
        authDomain: "cs-database-42dd0.firebaseapp.com",
        databaseURL: "https://cs-database-42dd0-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cs-database-42dd0",
        storageBucket: "cs-database-42dd0.firebasestorage.app",
        messagingSenderId: "265634068059",
        appId: "1:265634068059:web:4437f49f445c18d574717e"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();
    const dbRef = database.ref('globalStudentDB');

    const regNo = localStorage.getItem("loggedUserReg");
    const isAdmin = regNo === "ADMIN";
    if (isAdmin) document.getElementById("admin-section").style.display = "flex";

    let studentDB = {};

    // LISTEN TO CLOUD CHANGES
    dbRef.on('value', (snapshot) => {
        const cloudData = snapshot.val();
        if (cloudData) {
            studentDB = cloudData;
            updateUI();
        }
    });

    function updateUI() {
        const data = studentDB[regNo] || { name: "Guest", sgpa: 0, attendance: 0, grades: [], tasks: [] };
        document.getElementById("user-name").innerText = data.name;
        document.getElementById("user-reg").innerText = "Reg No: " + (regNo || "N/A");
        document.getElementById("user-sgpa").setAttribute('data-target', data.sgpa);
        document.getElementById("user-attendance").setAttribute('data-target', data.attendance);

        const subBox = document.getElementById("subject-container");
        subBox.innerHTML = "";
        if(data.grades) {
            data.grades.forEach(item => {
                const colorClass = getGradeStyle(item.g);
                subBox.innerHTML += `<div class="list-item"><span>${item.s}</span><span class="grade-pill ${colorClass}">${item.g === "null" ? "Pending" : item.g}</span></div>`;
            });
        }
        renderTasks();
        startCounters();
    }

    function getGradeStyle(g) {
        const grade = String(g).toUpperCase();
        if (grade === "O") return "grade-o";
        if (grade === "A+") return "grade-ap";
        if (grade === "A") return "grade-a";
        if (grade === "B+") return "grade-bp";
        if (grade === "B") return "grade-b";
        if (grade === "F") return "grade-f";
        return "grade-default";
    }

    window.renderTasks = () => {
        const taskBox = document.getElementById("task-container");
        taskBox.innerHTML = "";
        if (isAdmin) {
            Object.keys(studentDB).forEach(sID => {
                if(sID === "ADMIN") return;
                const tasks = studentDB[sID].tasks || [];
                tasks.forEach((task, index) => {
                    taskBox.innerHTML += createTaskHTML(task, sID, index, true);
                });
            });
        } else {
            const myTasks = studentDB[regNo]?.tasks || [];
            myTasks.forEach((task, index) => {
                taskBox.innerHTML += createTaskHTML(task, regNo, index, false);
            });
        }
    };

    function createTaskHTML(task, ownerID, index, showAdminTools) {
        const isSub = task.status === "submitted";
        const ownerName = showAdminTools ? `<small style="display:block; color:var(--primary); font-size:0.6rem;">FOR: ${studentDB[ownerID].name}</small>` : "";
        let adminButtons = showAdminTools ? `<div><button class="action-btn btn-status" onclick="toggleStatus('${ownerID}', ${index})">TOGGLE</button><button class="action-btn btn-remove" onclick="removeTask('${ownerID}', ${index})">REMOVE</button></div>` : "";
        return `<div class="list-item"><span>${ownerName}<span style="color: ${isSub ? '#22c55e' : '#ef4444'}; margin-right:10px;">●</span>${task.text}</span><div style="display:flex; align-items:center;"><span style="font-size: 0.6rem; padding: 3px 8px; border: 1px solid ${isSub ? '#22c55e' : '#ef4444'}; color: ${isSub ? '#22c55e' : '#ef4444'}">${task.status.toUpperCase()}</span>${adminButtons}</div></div>`;
    }

    window.pushTask = () => {
        const target = document.getElementById("student-select").value;
        const text = document.getElementById("task-input").value;
        if(!text) return;
        if(!studentDB[target].tasks) studentDB[target].tasks = [];
        studentDB[target].tasks.push({ text: text, status: "pending" });
        dbRef.set(studentDB); 
        document.getElementById("task-input").value = "";
    };

    window.toggleStatus = (ownerID, index) => {
        const current = studentDB[ownerID].tasks[index].status;
        studentDB[ownerID].tasks[index].status = (current === "pending") ? "submitted" : "pending";
        dbRef.set(studentDB);
    };

    window.removeTask = (ownerID, index) => {
        if(confirm("Delete this task?")) {
            studentDB[ownerID].tasks.splice(index, 1);
            dbRef.set(studentDB);
        }
    };

    function startCounters() {
        document.querySelectorAll('.count-up').forEach(counter => {
            const target = +counter.getAttribute('data-target');
            let count = 0;
            const updateCount = () => {
                if (count < target) {
                    count += (target / 50);
                    counter.innerText = (counter.id === "user-sgpa") ? count.toFixed(3) : Math.ceil(count) + "%";
                    setTimeout(updateCount, 20);
                } else {
                    counter.innerText = (counter.id === "user-sgpa") ? target.toFixed(3) : target + "%";
                }
            };
            updateCount();
        });
    }
});
</script>
