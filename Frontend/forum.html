<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Forum | Computer Science</title>

  <!-- ✅ FIXED PATH -->
  <link rel="stylesheet" href="frontend/forum.css">
</head>
<body>

<div class="forum-container">

  <!-- ✅ FIXED PATH -->
  <a href="frontend/index.html" class="back-link">← Go to Home</a>

  <!-- Header -->
  <div class="forum-header-text">
    <div>
      <h1 class="forum-title">💬 CS Forum</h1>
      <p class="forum-sub">Ask. Discuss. Grow.</p>
    </div>
    <div class="badge-count" id="postCountBadge">0 posts</div>
  </div>

  <!-- 🔥 Username (light identity) -->
  <input 
    type="text"
    id="username"
    placeholder="Your name (optional)"
    class="username-input"
  />

  <!-- Create Post -->
  <div class="create-post">
    <input 
      type="text" 
      id="title" 
      placeholder="Ask a question..."
      autocomplete="off" 
    />

    <textarea 
      id="content" 
      placeholder="Explain your problem..."
    ></textarea>

    <button class="btn-primary" id="publishBtn">
      ✍️ Publish thread
    </button>
  </div>

  <!-- 🔥 Loading indicator -->
  <div id="loading" style="display:none; text-align:center;">
    Loading...
  </div>

  <!-- Posts List -->
  <div id="posts" class="posts-list">

    <div class="empty-state" id="emptyState">
      No discussions yet 🚀 <br>
      Be the first to ask something.
    </div>

  </div>

</div>

<!-- ✅ FIXED PATH -->
<script src="forum.js"></script>

</body>
</html>
