<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Computer Science</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">

        <div class="login-card">
            <div class="login-header">
                <h2>Student Login</h2>
                <p>Enter your Details to access the dashboard.</p>
            </div>

            <div id="errorMessage" class="error-message">Invalid credentials. Please try again.</div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="regInput">Registration Number</label>
                    <input type="text" id="regInput" placeholder="e.g. GVAZSCS001" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="passInput">Password</label>
                    <input type="password" id="passInput" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
