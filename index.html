<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Science Portal</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        // 🔒 Security Check
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.replace("login.html");
        }
    </script>

    <style>
        /* Ensure body is visible if JS fails */
        body.show { opacity: 1 !important; }

        /* 🔥 SIDEBAR STYLES */
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            padding: 100px 40px;
            gap: 25px;
            transition: 0.4s ease-in-out;
            z-index: 3000;
            border-left: 1px solid rgba(34, 197, 94, 0.2);
        }

        .side-menu.active { right: 0; }

        .side-menu a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
        }

        .side-menu a:hover { color: #22c55e; transform: translateX(10px); }

        .logout-link {
            color: #ef4444 !important;
            margin-top: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Hide standard links for the clean look */
        .nav-links { display: none !important; }
        .hamburger { display: flex !important; cursor: pointer; }
    </style>
</head>

<body class="show"> <nav class="nav">
    <div class="head-nav">
        Computer <br><span>Science</span>
    </div>

    <div class="hamburger" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<div class="side-menu" id="sideMenu">
    <a href="index.html">Home</a>
    <a href="resources.html">Resources</a>
    <a href="insights.html">Insights</a>
    <a href="events.html">Events</a>
    <a href="https://beta.gracevalleycollege.ac.in/">Forums</a>
    <hr style="border: 0.5px solid rgba(255,255,255,0.1)">
    <div class="logout-link" id="logoutBtn">Logout</div>
</div>

<section class="about">
    <h2 id="welcomeMessage" style="color: #22c55e; font-size: 28px; margin-bottom: 15px; font-weight: bold;"></h2>
    <h1 class="typing"></h1>
    <p class="sub-text">Where Technology Meets Innovation 🚀</p>
</section>

<script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const menuToggle = document.getElementById("menuToggle");
        const sideMenu = document.getElementById("sideMenu");
        const logoutBtn = document.getElementById("logoutBtn");

        // 1. Greet User
        const userName = localStorage.getItem("loggedUserName");
        if (userName) {
            document.getElementById("welcomeMessage").innerText = "Welcome back, " + userName + "!";
        }

        // 2. Sidebar Toggle
        menuToggle.onclick = (e) => {
            e.stopPropagation();
            sideMenu.classList.toggle("active");
        };

        // 3. Click outside to close
        document.onclick = (e) => {
            if (!sideMenu.contains(e.target) && sideMenu.classList.contains("active")) {
                sideMenu.classList.remove("active");
            }
        };

        // 4. Logout
        if (logoutBtn) {
            logoutBtn.onclick = () => {
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("loggedUserName");
                window.location.replace("login.html");
            };
        }
    });
</script>
</body>
</html>
