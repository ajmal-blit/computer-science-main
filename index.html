<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Science</title>
<link rel="stylesheet" href="style.css">
<script>
    // Security check remains at the top
    if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.replace("login.html");
    }
</script>
<style>
    /* 🔥 SIDEBAR STYLES */
    .side-menu {
        position: fixed;
        top: 0;
        right: -280px; /* Hidden by default */
        width: 280px;
        height: 100%;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(15px);
        display: flex;
        flex-direction: column;
        padding: 100px 40px;
        gap: 25px;
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 2000;
        border-left: 1px solid rgba(34, 197, 94, 0.2);
    }

    .side-menu.active {
        right: 0;
    }

    .side-menu a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        transition: 0.3s;
    }

    .side-menu a:hover {
        color: #22c55e;
        padding-left: 10px;
    }

    .logout-link {
        color: #ef4444 !important; /* Distinct red for logout */
        margin-top: 20px;
        font-weight: bold;
    }

    /* Override navbar to hide desktop links */
    .nav-links {
        display: none !important; /* Force hide desktop links */
    }

    .hamburger {
        display: flex !important; /* Force show hamburger */
    }
</style>
</head>

<body>

<nav class="nav">
    <div class="head-nav">
        Computer <br><span>Science</span>
    </div>

    <div class="hamburger" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<div class="side-menu" id="sideMenu">
    <a href="index.html">Home</a>
    <a href="resources.html">Resources</a>
    <a href="insights.html">Insights</a>
    <a href="events.html">Events</a>
    <a href="https://beta.gracevalleycollege.ac.in/">Forums</a>
    <hr style="border: 0.5px solid rgba(255,255,255,0.1)">
    <a class="logout-link" id="logoutBtn">Logout</a>
</div>

<section class="about">
    <h2 id="welcomeMessage" style="color: #22c55e; font-size: 28px; margin-bottom: 15px; font-weight: bold;"></h2>
    <h1 class="typing"></h1>
    <p class="sub-text">Where Technology Meets Innovation 🚀</p>
    </section>

<footer class="footer">
    <p>© 2026 Computer Science Department</p>
</footer>

<script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const menuToggle = document.getElementById("menuToggle");
        const sideMenu = document.getElementById("sideMenu");
        const logoutBtn = document.getElementById("logoutBtn");

        // 1. Greet the user
        const userName = localStorage.getItem("loggedUserName");
        if (userName) {
            document.getElementById("welcomeMessage").innerText = "Welcome back, " + userName + "!";
        }

        // 2. Toggle Side Menu
        menuToggle.addEventListener("click", () => {
            sideMenu.classList.toggle("active");
        });

        // 3. Close menu when clicking outside
        document.addEventListener("click", (e) => {
            if (!sideMenu.contains(e.target) && !menuToggle.contains(e.target)) {
                sideMenu.classList.remove("active");
            }
        });

        // 4. Secure Logout
        if (logoutBtn) {
            logoutBtn.addEventListener("click", () => {
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("loggedUserName");
                window.location.replace("login.html");
            });
        }
    });
</script>
</body>
</html>
